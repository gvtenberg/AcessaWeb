<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <title>AcessaWeb - Entrar</title>

    <script src="scripts/carrega-tema.js"></script>

    <script src="https://cdn.tailwindcss.com"></script> <!-- TailWind v4 não funcionou direto no browser -->
    <script src="styles/tailwind-config.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">

    <script src="scripts/app.js" defer></script>
    <script src="scripts/menu.js" defer></script>
    <script src="scripts/componentes.js" defer></script>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header id="menu__container"></header>

    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-12">
        <section class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-4">
                Entrar
            </h1>

            <p class="texto-secundario-paleta text-lg max-w-3xl mx-auto">
                Acesse sua conta para visualizar e gerenciar suas tarefas.
            </p>
        </section>

        <section id="secao-login" class="superficie-paleta max-w-lg mx-auto p-6 rounded-lg shadow-lg" aria-labelledby="titulo-formulario-login">

            <h2 id="titulo-formulario-login" class="text-2xl font-bold mb-4">
                Acesso à conta
            </h2>

            <div id="login-app">
                <p class="texto-secundario-paleta">
                    O formulário de autenticação será carregado nesta área.
                </p>
            </div>

            <p id="login-feedback" class="hidden mt-4 p-3 rounded font-semibold" role="status" aria-live="polite">
            </p>
        </section>
    </main>

    <!-- footer, aviso LGPD e botão whatsapp -->
    <div id="componentes__container" class="contents"></div>

    <!-- Widget Libras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
